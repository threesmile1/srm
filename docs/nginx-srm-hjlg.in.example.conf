# 复制到 /etc/nginx/sites-available/ 并按需 include；与本机 default_server 并存时靠 server_name 分流。
# 对外：路由器 WAN:8888 → 本机:80 时，浏览器使用 http://srm.hjlg.in:8888 等。

# 采购管理端（srm-admin-web → /var/www/srm-admin）
server {
    listen 80;
    listen [::]:80;
    server_name srm.hjlg.in;

    root /var/www/srm-admin;
    index index.html;

    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://127.0.0.1:18081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# 供应商门户（srm-portal-web → /var/www/srm-portal）
