spring:
  profiles:
    active: dev
  application:
    name: srm-backend
  jackson:
    time-zone: ${srm.business-timezone:Asia/Shanghai}
  datasource:
    url: jdbc:mysql://localhost:3306/srm?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai
    username: srm
    password: srm
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# 收货超收比例、U9 导入单据类型编码（与《导入映射说明书》冻结值对齐）
# 业务时区：JVM 默认 + 合同到期定时任务 cron 解读（见 BusinessTimezoneApplicationListener、ContractExpiryNotificationScheduler）
srm:
  business-timezone: Asia/Shanghai
  # 未捕获异常时返回 JSON（浏览器 Network 可见），栈信息见 include-stack-trace（生产务必 false）
  api:
    include-stack-trace: false
  # 供应商门户上传的发票附件（PDF/图片）本地目录
  invoice-upload-dir: ${user.home}/.srm/invoice-files
  over-receive-ratio: 0.05
  export-po-type-code: PO01
  export-gr-type-code: GR01
  # 物料同步：帆软 Decision POST（响应含 err_code=0、data 为对象数组或 {data:{rows:[]}}）或 GET JSON
  u9:
    enabled: true
    # 帆软：POST …/webroot/decision/url/api/data（无请求体「从 U9 同步」时必须配置 decision-api-url 或 material-sync-url）
    decision-api-url: http://erp.paterson.com.cn:8050/webroot/decision/url/api/data
    # 分页拉取每页条数（推荐）；≤0 则单次请求用下方 page-size（-1 易大包超时）
    sync-page-size: 500
    # report-path: API/wuliao.cpt
    # datasource-name: ds1
    # page-number: 1
    # page-size: -1
    # 料品供应商 lpgys.cpt（POST /materials/sync-suppliers-from-u9 或行内同步；见 GET /suppliers/material-derived）
    # supplier-report-path: API/lpgys.cpt
    # 仓库 cangku.cpt（parameters: name=cangku, value 空串）
    # warehouse-report-path: API/cangku.cpt
    # U9 已审核未关闭采购订单 → SRM（帆软 parameters 默认同现场 [{}]）
    # purchase-order-report-path: API/caigou_cp.cpt
    # purchase-order-fine-report-parameters: []
    # 物料四厂默认仓：按料号逐次请求 cangku_yigui + cangku_shuiqi（parameters 默认 name=code、value=料号）
    # material-yigui-report-path: API/cangku_yigui.cpt
    # material-shuiqi-report-path: API/cangku_shuiqi.cpt
    # factory-warehouse-report-parameter-name: code
    # material-factory-warehouse-parameters: []  # 非空时按模板传参，value 为空则注入当前料号
    # 物料四厂仓写入 warehouse 表时绑定的采购组织 org_unit.code（不配则按名称「苏州工厂」等查找）
    # factory-warehouse-org-code-suzhou: ""
    # factory-warehouse-org-code-chengdu: ""
    # factory-warehouse-org-code-huanan: ""
    # factory-warehouse-org-code-shuiqi: ""
    # factory-warehouse-org-code-ningbo: "NB"
    # fine-report-parameters:
    #   - name: pinming
    #     type: String
    #     value: ""
    # 兼容：直接 GET JSON
    # material-sync-url: https://u9-host/ReportService/wuliao.cpt
    # base-url: https://u9-host/api
    # material-api-path: wuliao.cpt
    # http-user: ""
    # http-password: ""
    # 调用帆软/U9 超时（毫秒）：默认连接 15s、读取 600s，仍慢可加大 http-read-timeout-ms
    # http-connect-timeout-ms: 15000
    # http-read-timeout-ms: 600000

logging:
  level:
    org.hibernate.SQL: debug
