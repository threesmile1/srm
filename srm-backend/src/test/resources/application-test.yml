# 仅用于 @SpringBootTest：内存 H2 + 由 Hibernate 建表，不跑 Flyway（避免与 MySQL 脚本差异干扰冒烟）
spring:
  task:
    scheduling:
      enabled: false
  datasource:
    url: jdbc:h2:mem:srm;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: false

srm:
  business-timezone: Asia/Shanghai
  over-receive-ratio: 1.0
  enforce-max-receive-limit: false
  export-po-type-code: PO01
  export-gr-type-code: GR01

logging:
  level:
    root: warn
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn
